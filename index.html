<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- RIGA 1 -->
  <div class="row row1">
    <div class="cell">
      <div class="ratio-16-9">
        <iframe src="https://fulvioferrara1984-hub.github.io/TGISport_Dashboard/"></iframe>
      </div>
    </div>

    <div class="cell">
      <div class="ratio-16-9">
        <img id="nexus-slideshow" />
      </div>
    </div>
  </div>

  <!-- RIGA 2 -->
  <div class="row row2">

    <!-- col 1 -->
    <div class="cell">
      <div class="ratio-16-9">
        <iframe src="https://www.youtube.com/embed/OLnWGKqsQ0s?si=w92WbiO1w3kUhHs6"></iframe>
      </div>
    </div>

    <!-- col 2 -->
    <div class="cell vertical">
      <img id="grafico-slideshow" />
    </div>

    <!-- col 3 -->
    <div class="cell">
      <div class="ratio-16-9">
        <video src="multiview.mp4" autoplay muted loop></video>
      </div>
    </div>

    <!-- col 4 -->
    <div class="cell vertical clocks" id="clocks"></div>

  </div>

  <div class="row row3">

  <div class="footer-left">
    <img src="TGILogo.png" class="footer-logo">
  </div>

  <div class="footer-center" id="datetime"></div>

  <div class="footer-right">
    <img src="TGILogo.png" class="footer-logo">
  </div>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
